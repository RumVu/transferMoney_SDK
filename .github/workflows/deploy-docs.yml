name: Deploy DocC to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate DocC Documentation
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/build-docs"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          swift package --allow-writing-to-directory "$OUTPUT_DIR" \
            generate-documentation \
            --target transferMoney_SDK \
            --output-path "$OUTPUT_DIR" \
            --transform-for-static-hosting \
            --hosting-base-path transferMoney_SDK

      - name: Deploy to gh-pages branch
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git checkout -B gh-pages origin/gh-pages 2>/dev/null || git checkout --orphan gh-pages
          rm -rf *
          cp -R "$RUNNER_TEMP/build-docs"/. .
          git add .
          git commit -m "Deploy DocC documentation" || true
          git push origin gh-pages --force
