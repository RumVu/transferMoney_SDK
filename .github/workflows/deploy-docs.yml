name: Build Hosted DocC

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate DocC Documentation
        run: |
          OUTPUT_DIR="$RUNNER_TEMP/reference-docs"
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          swift package --allow-writing-to-directory "$OUTPUT_DIR" \
            generate-documentation \
            --target transferMoney_SDK \
            --output-path "$OUTPUT_DIR" \
            --transform-for-static-hosting \
            --hosting-base-path transferMoney_SDK/reference

      - name: Update hosted reference in docs/reference/
        run: |
          mkdir -p ./docs/reference
          rsync -a --delete "$RUNNER_TEMP/reference-docs"/ ./docs/reference/
          if git diff --quiet -- docs/reference; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git add docs/reference
          git commit -m "Update hosted DocC [skip ci]"
          git push origin HEAD:main
