name: Deploy Custom Docs Portal

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        run: |
          SITE_DIR="$RUNNER_TEMP/site"
          REF_DIR="$RUNNER_TEMP/reference-docs"
          rm -rf "$SITE_DIR" "$REF_DIR"
          mkdir -p "$SITE_DIR" "$REF_DIR"

          # Copy the custom portal and all static assets except the generated API reference.
          rsync -a --exclude reference ./docs/ "$SITE_DIR"/

          # Generate a fresh DocC reference site under /reference/.
          swift package --allow-writing-to-directory "$REF_DIR" \
            generate-documentation \
            --target transferMoney_SDK \
            --output-path "$REF_DIR" \
            --transform-for-static-hosting \
            --hosting-base-path transferMoney_SDK/reference

          mkdir -p "$SITE_DIR/reference"
          rsync -a "$REF_DIR"/ "$SITE_DIR/reference"/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
